<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Dark Background -->
  <rect width="100" height="100" rx="24" fill="#0a0a0a" />
  
  <!-- Glowing Border -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="url(#gradient)" stroke-width="4" filter="url(#glow)" />
  
  <!-- Stylized Soccer Ball -->
  <g transform="translate(0, -4)">
    <circle cx="50" cy="46" r="22" fill="none" stroke="#fff" stroke-width="3" />
    
    <!-- Center Pentagon -->
    <path d="M 50 36 
             L 58 42 
             L 55 51 
             L 45 51 
             L 42 42 Z" fill="url(#gradient)" />
             
    <!-- Lines from Pentagon to Circle -->
    <path d="M 50 36 L 50 24 
             M 58 42 L 69 36 
             M 55 51 L 64 62 
             M 45 51 L 36 62 
             M 42 42 L 31 36" 
          stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
  </g>
  
  <!-- Typography -->
  <text x="50" y="86" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="18" fill="#fff" text-anchor="middle" letter-spacing="1">WC26</text>
</svg>